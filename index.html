<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aplicación de Clima - Open-Meteo</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container mt-5">
        
        <div class="text-end mb-3">
            <button class="btn btn-outline-secondary" id="themeToggler">
                <span id="themeIcon">🌙</span> <span id="themeText">Modo Oscuro</span>
            </button>
        </div>

        <div class="row mb-5">
            <div class="col-md-8 mx-auto">
                <h1 class="text-center mb-4">🌤️ Meteo Flux</h1>
                <p class="text-center text-muted">Ingresa el nombre de una o varias ciudades para obtener información del clima en tiempo real</p>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-8 mx-auto">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form id="weatherForm">
                            <div class="input-group mb-3">
                                <input 
                                    type="text" 
                                    class="form-control" 
                                    id="cityInput" 
                                    placeholder="Ej: Madrid, Buenos Aires, Nueva York..."
                                    aria-label="Nombre de la ciudad"
                                    required
                                >
                                <button class="btn btn-primary" type="submit" id="searchBtn">
                                    <span id="btnText">Buscar</span>
                                    <span id="spinner" class="spinner-border spinner-border-sm ms-2 d-none" role="status" aria-hidden="true"></span>
                                </button>
                            </div>
                            <small class="text-muted">Presiona Enter o haz clic en "Buscar"</small>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div id="loadingMessage" class="alert alert-info text-center d-none" role="alert">
            <div class="spinner-border spinner-border-sm me-2" role="status">
                <span class="visually-hidden">Cargando...</span>
            </div>
            <strong>Buscando información del clima...</strong>
        </div>

        <div id="errorMessage" class="alert alert-danger d-none" role="alert">
            <strong>⚠️ Error:</strong>
            <span id="errorText"></span>
        </div>

        <div class="row" id="resultsContainer"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
